hostname bgpd-r500
password zebra
!
route-map FAKE-ASPATH permit 10
 set as-path prepend 65099 65098
!
router bgp 500
 bgp router-id 5.5.5.5
 no bgp ebgp-requires-policy
 neighbor 172.16.25.1 remote-as 200
 neighbor 2001:db8:25::1 remote-as 200
 neighbor 2001:db8:25::1 update-source 2001:db8:25::2
 !
 address-family ipv4 unicast
  network 10.50.0.0/24
  network 10.100.0.0/24
  neighbor 172.16.25.1 activate
  neighbor 172.16.25.1 route-map FAKE-ASPATH out
 exit-address-family
 !
 address-family ipv6 unicast
  network 2001:db8:500::/64
  neighbor 2001:db8:25::1 activate
 exit-address-family
!
line vty
