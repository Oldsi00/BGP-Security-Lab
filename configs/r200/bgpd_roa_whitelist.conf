hostname bgpd-r200
password zebra
!
ip prefix-list ROA-AUTH-5 seq 5 permit 10.100.0.0/24 le 24
ip prefix-list ROA-AUTH-10 seq 5 permit 10.40.1.0/24 le 24
ip prefix-list ROA-AUTH-15 seq 5 permit 10.40.2.0/24 le 24
ip prefix-list ROA-BLOCK-5 seq 5 deny 10.100.0.0/24 le 32
ip prefix-list ROA-BLOCK-5 seq 100 permit 0.0.0.0/0 le 32
ip prefix-list ROA-BLOCK-10 seq 5 deny 10.40.1.0/24 le 32
ip prefix-list ROA-BLOCK-10 seq 100 permit 0.0.0.0/0 le 32
ip prefix-list ROA-BLOCK-15 seq 5 deny 10.40.2.0/24 le 32
ip prefix-list ROA-BLOCK-15 seq 100 permit 0.0.0.0/0 le 32
!
router bgp 200
 bgp router-id 200.0.0.1
 no bgp ebgp-requires-policy
 neighbor 172.16.12.1 remote-as 100
 neighbor 172.16.24.2 remote-as 400
 neighbor 172.16.25.2 remote-as 500
 neighbor 2001:db8:12::1 remote-as 100
 neighbor 2001:db8:24::2 remote-as 400
 neighbor 2001:db8:25::2 remote-as 500
 neighbor 2001:db8:12::1 update-source 2001:db8:12::2
 neighbor 2001:db8:24::2 update-source 2001:db8:24::1
 neighbor 2001:db8:25::2 update-source 2001:db8:25::1
 !
 address-family ipv4 unicast
  neighbor 172.16.12.1 activate
  neighbor 172.16.24.2 activate
  neighbor 172.16.25.2 activate
  neighbor 172.16.25.2 prefix-list ROA-BLOCK-5 in
 exit-address-family
 !
 address-family ipv6 unicast
  neighbor 2001:db8:12::1 activate
  neighbor 2001:db8:24::2 activate
  neighbor 2001:db8:25::2 activate
 exit-address-family
!
line vty
