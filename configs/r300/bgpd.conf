hostname bgpd-r300
password zebra
!
router bgp 300
 bgp router-id 3.3.3.3
 no bgp ebgp-requires-policy
 neighbor 172.16.13.1 remote-as 100
 neighbor 172.16.34.2 remote-as 400
 neighbor 172.16.36.2 remote-as 600
 neighbor 2001:db8:13::1 remote-as 100
 neighbor 2001:db8:34::2 remote-as 400
 neighbor 2001:db8:36::2 remote-as 600
 neighbor 2001:db8:13::1 update-source 2001:db8:13::2
 neighbor 2001:db8:34::2 update-source 2001:db8:34::1
 neighbor 2001:db8:36::2 update-source 2001:db8:36::1
 !
 address-family ipv4 unicast
  neighbor 172.16.13.1 activate
  neighbor 172.16.34.2 activate
  neighbor 172.16.36.2 activate
 exit-address-family
 !
 address-family ipv6 unicast
  neighbor 2001:db8:13::1 activate
  neighbor 2001:db8:34::2 activate
  neighbor 2001:db8:36::2 activate
 exit-address-family
!
line vty
