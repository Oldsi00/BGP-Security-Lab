hostname bgpd-r500
password zebra
!
router bgp 500
 bgp router-id 5.5.5.5
 no bgp ebgp-requires-policy
 neighbor 172.16.25.1 remote-as 200
 neighbor 2001:db8:25::1 remote-as 200
 neighbor 2001:db8:25::1 update-source 2001:db8:25::2
 !
 address-family ipv4 unicast
  network 10.50.0.0/24
  network 10.200.0.0/24
  network 10.200.1.0/24
  network 10.200.2.0/24
  network 10.200.3.0/24
  network 10.200.4.0/24
  network 10.200.5.0/24
  network 10.200.6.0/24
  network 10.200.7.0/24
  network 10.200.8.0/24
  network 10.200.9.0/24
  network 10.200.10.0/24
  network 10.200.11.0/24
  neighbor 172.16.25.1 activate
 exit-address-family
 !
 address-family ipv6 unicast
  network 2001:db8:500::/64
  neighbor 2001:db8:25::1 activate
 exit-address-family
!
line vty
