hostname bgpd-r600
password zebra
!
 router bgp 600
 bgp router-id 6.6.6.6
 no bgp ebgp-requires-policy
 neighbor 172.16.36.1 remote-as 300
 neighbor 2001:db8:36::1 remote-as 300
 neighbor 2001:db8:36::1 update-source 2001:db8:36::2
 !
 address-family ipv4 unicast
  network 10.60.0.0/24
  neighbor 172.16.36.1 activate
 exit-address-family
 !
 address-family ipv6 unicast
  network 2001:db8:600::/64
  neighbor 2001:db8:36::1 activate
 exit-address-family
!
line vty
