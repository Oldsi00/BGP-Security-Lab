hostname bgpd-r100
password zebra
!
router bgp 100
 bgp router-id 100.0.0.1
 no bgp ebgp-requires-policy
 neighbor 172.16.12.2 remote-as 200
 neighbor 172.16.13.2 remote-as 300
 neighbor 2001:db8:12::2 remote-as 200
 neighbor 2001:db8:13::2 remote-as 300
 neighbor 2001:db8:12::2 update-source 2001:db8:12::1
 neighbor 2001:db8:13::2 update-source 2001:db8:13::1
 !
 address-family ipv4 unicast
  network 10.100.0.0/24
  neighbor 172.16.12.2 activate
  neighbor 172.16.13.2 activate
 exit-address-family
 !
 address-family ipv6 unicast
  network 2001:db8:100::/64
  neighbor 2001:db8:12::2 activate
  neighbor 2001:db8:13::2 activate
 exit-address-family
!
line vty
